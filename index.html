<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ramo de Flores Realista - Vista Superior</title>
    <style>
        body {
            margin: 0;
            background-color: #030303; /* Fondo casi negro para resaltar las flores */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        #loading {
            position: absolute;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div id="loading">Cargando flores realistas...</div>
<canvas id="flowerCanvas" style="display:none;"></canvas>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');
    const loadingDiv = document.getElementById('loading');

    // Definimos el tamaño del lienzo
    canvas.width = 900;
    canvas.height = 900;

    // --- CONFIGURACIÓN DE LAS IMÁGENES ---
    // Reemplaza estas URLs con las rutas reales a tus archivos JPG si las tienes localmente.
    // Por ahora, usaré marcadores de posición que simulan tus imágenes.
    const flowerSources = [
        { src: 'ruta/a/tu/imagen_girasoles_vangogh.jpg', type: 'sunflower' },
        { src: 'ruta/a/tu/imagen_rosas_reales.jpg', type: 'rose' }
    ];

    // Para que este código funcione DEMOSTRATIVAMENTE, usaré imágenes de ejemplo de internet.
    // CUANDO TENGAS TUS ARCHIVOS, COMENTA ESTAS LÍNEAS Y DESCOMENTA LAS DE ARRIBA.
    const demoSources = [
        { src: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Vincent_Willem_van_Gogh_127.jpg/800px-Vincent_Willem_van_Gogh_127.jpg', type: 'sunflower' },
        { src: 'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=800&auto=format&fit=crop', type: 'rose' }
    ];

    const images = [];
    let imagesLoaded = 0;

    // Cargamos las imágenes
    demoSources.forEach((source, index) => {
        const img = new Image();
        img.src = source.src;
        img.onload = () => {
            imagesLoaded++;
            if (imagesLoaded === demoSources.length) {
                startBouquet();
            }
        };
        img.onerror = () => {
            loadingDiv.innerHTML = "Error al cargar las imágenes. Asegúrate de que las rutas sean correctas.";
        }
        images.push({ img, type: source.type });
    });

    function drawRealFlower(img, x, y, radius, rotation) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);

        // Crear un recorte circular para simular la vista superior de la flor
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.clip();

        // Dibujar la imagen escalada y centrada dentro del recorte
        const aspect = img.width / img.height;
        let drawWidth, drawHeight;

        if (aspect > 1) {
            drawHeight = radius * 2;
            drawWidth = drawHeight * aspect;
        } else {
            drawWidth = radius * 2;
            drawHeight = drawWidth / aspect;
        }

        ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
        ctx.restore();
    }

    function startBouquet() {
        loadingDiv.style.display = 'none';
        canvas.style.display = 'block';
        
        // Creamos una mezcla de flores en un ramo circular
        const flowersInBouquet = [];
        const numFlores = 16;
        const bouquetRadius = 250;

        for (let i = 0; i < numFlores; i++) {
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * bouquetRadius;
            
            flowersInBouquet.push({
                imgObj: images[Math.floor(Math.random() * images.length)],
                x: canvas.width / 2 + Math.cos(angle) * distance,
                y: canvas.height / 2 + Math.sin(angle) * distance,
                radius: 50 + Math.random() * 40,
                rotation: Math.random() * Math.PI * 2,
                // Añadimos una ligera variación de velocidad para la animación
                speed: 0.002 + Math.random() * 0.003
            });
        }

        // Ordenamos las flores por posición Y para que las de "atrás" se dibujen primero
        flowersInBouquet.sort((a, b) => a.y - b.y);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            flowersInBouquet.forEach(f => {
                // Pequeña animación de rotación
                f.rotation += f.speed;
                drawRealFlower(f.imgObj.img, f.x, f.y, f.radius, f.rotation);
            });

            requestAnimationFrame(animate);
        }

        animate();
    }

</script>
</body>
</html>
