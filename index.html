<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores 💛</title>

<style>
body {
    margin:0;
    background:black;
    overflow:hidden;
}
canvas {
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.lineJoin = "round";
ctx.lineCap = "round";

let angle = 0;
let appear = 0;

// 🌹 flor tipo turtle (más realista)
function drawFlower(x, y, size, petalColor, centerColor){
    ctx.save();
    ctx.translate(x, y);

    // pétalos
    for(let i=0;i<36;i++){
        ctx.rotate(Math.PI/18);

        ctx.beginPath();
        ctx.moveTo(0,0);

        ctx.bezierCurveTo(
            size*0.2, -size*0.4,
            size*0.8, -size*0.4,
            0, -size
        );

        ctx.bezierCurveTo(
            -size*0.8, -size*0.4,
            -size*0.2, -size*0.4,
            0,0
        );

        ctx.fillStyle = petalColor;
        ctx.fill();
    }

    // centro
    ctx.beginPath();
    ctx.arc(0,0,size*0.3,0,Math.PI*2);
    ctx.fillStyle = centerColor;
    ctx.fill();

    ctx.restore();
}

// 🌿 tallo
function drawStem(x,y,length){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x,y+length);
    ctx.strokeStyle = "green";
    ctx.lineWidth = 4;
    ctx.stroke();
}

// 🌼 hojas
function drawLeaf(x,y,side){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.quadraticCurveTo(x+side*40,y+30,x,y+60);
    ctx.quadraticCurveTo(x-side*40,y+30,x,y);
    ctx.fillStyle = "green";
    ctx.fill();
}

function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(angle);

    // posiciones
    let flowers = [
        [-200, 100, "red"],
        [200, 100, "pink"],
        [0, -200, "orange"],
        [-150, -50, "yellow"],
        [150, -50, "gold"]
    ];

    flowers.forEach((f, i)=>{
        if(i < appear){

            drawStem(f[0], f[1], 120);
            drawLeaf(f[0], f[1]+40, 1);
            drawLeaf(f[0], f[1]+60, -1);

            drawFlower(
                f[0],
                f[1],
                60,
                f[2],
                "brown"
            );
        }
    });

    ctx.restore();

    // animación
    angle += 0.005;

    if(appear < flowers.length){
        appear += 0.01;
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
