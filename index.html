<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ramo de Girasoles y Rosas</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { box-shadow: 0 0 30px rgba(255,255,255,0.1); cursor: pointer; }
    </style>
</head>
<body>
<canvas id="bouquetCanvas"></canvas>

<script>
    // Datos extraídos de tus archivos JSON (Simplificados para el ejemplo funcional)
    const rosasData =; 
    const sunflowersData =;

    const canvas = document.getElementById('bouquetCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 800;

    // Función para convertir color RGB (0-255 o 0-1) a string CSS
    function getColor(colorArray) {
        const r = colorArray[0] > 1 ? colorArray[0] : colorArray[0] * 255;
        const g = colorArray[1] > 1 ? colorArray[1] : colorArray[1] * 255;
        const b = colorArray[2] > 1 ? colorArray[2] : colorArray[2] * 255;
        return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
    }

    function drawFlower(data, x, y, scale, rotation) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);

        // Centrar el dibujo basado en los límites de los puntos
        const allPoints = data.flatMap(r => r.contour);
        const minX = Math.min(...allPoints.map(p => p[0]));
        const maxX = Math.max(...allPoints.map(p => p[0]));
        const minY = Math.min(...allPoints.map(p => p[1]));
        const maxY = Math.max(...allPoints.map(p => p[1]));
        
        const offsetX = -(minX + maxX) / 2;
        const offsetY = -(minY + maxY) / 2;
        ctx.translate(offsetX, offsetY);

        data.forEach(region => {
            ctx.beginPath();
            ctx.fillStyle = getColor(region.color);
            const points = region.contour;
            ctx.moveTo(points[0][0], points[0][1]);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i][0], points[i][1]);
            }
            ctx.closePath();
            ctx.fill();
        });
        ctx.restore();
    }

    function createBouquet() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const numFlores = 12; // Ajusta cuántas flores quieres
        const bouquet = [];

        for (let i = 0; i < numFlores; i++) {
            bouquet.push({
                type: Math.random() > 0.5 ? sunflowersData : rosasData,
                x: canvas.width/2 + (Math.random() - 0.5) * 400,
                y: canvas.height/2 + (Math.random() - 0.5) * 400,
                scale: 0.5 + Math.random() * 0.7,
                rotation: Math.random() * Math.PI * 2
            });
        }

        // Dibujar las flores mezcladas
        bouquet.forEach(f => drawFlower(f.type, f.x, f.y, f.scale, f.rotation));
    }

    // Iniciar y permitir regenerar con click
    createBouquet();
    canvas.addEventListener('click', createBouquet);

</script>
</body>
</html>
